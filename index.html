<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no,
initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="css/main.css">
    <script defer src="js/vue.js"></script>
    <script defer src="js/main.js"></script>
    <title>Kanban Board</title>
</head>
<body>
    <div id="app">
        <div>
             <h2>Planned tasks</h2>
            <column :cards="planTasks" :show="true" @move-to-work="moveCardToWork"></column>
        </div>
       <h2>Tasks to work on</h2>
        <column :cards="workTasks" @move-to-test="moveCardToTest" :work="true"></column>
        <h2>Tasks to test</h2>
        <column :cards="testTasks" @move-to-comp="moveCardToComp" :comp="true"
        @return-to-work="returnFromTestToWork"></column>
        <h2>Completed tasks</h2>
        <column :cards="compTasks" :edit="false"></column>
    </div>
</body>
</html>
